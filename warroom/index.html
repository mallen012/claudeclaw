<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ClaudeClaw War Room</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100vh; background: #05060a; color: #e6e2d3;
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    overflow: hidden;
  }
  .intro {
    position: fixed; inset: 0; background: radial-gradient(ellipse at center, #1a1410 0%, #000 80%);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    opacity: 1; transition: opacity 1.5s ease-out;
  }
  .intro.fade { opacity: 0; pointer-events: none; }
  .intro .title {
    text-align: center; letter-spacing: 8px; text-transform: uppercase;
    animation: emerge 2s ease-out;
  }
  .intro .title h1 { font-size: 56px; font-weight: 400; color: #d4af37; margin-bottom: 12px; }
  .intro .title p { font-size: 14px; color: #8a7e62; letter-spacing: 4px; }
  @keyframes emerge { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  .room { display: grid; grid-template-columns: 280px 1fr 300px; height: 100vh; }
  .side { background: #0a0806; border-right: 1px solid #1f1a10; padding: 24px; overflow-y: auto; }
  .side.right { border-right: none; border-left: 1px solid #1f1a10; }
  .side h2 {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: #8a7e62; margin-bottom: 16px; font-weight: 400;
  }
  .agent {
    display: flex; align-items: center; gap: 12px; padding: 10px;
    border-radius: 8px; cursor: pointer; margin-bottom: 6px;
    border: 1px solid transparent; transition: all 0.2s;
  }
  .agent:hover { background: #13100a; }
  .agent.pinned { border-color: #d4af37; background: #1a1410; }
  .agent .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    background: #1f1a10;
  }
  .agent .name { font-size: 15px; }
  .agent .role { font-size: 11px; color: #6a5e42; letter-spacing: 1px; text-transform: uppercase; }
  .agent .spark {
    width: 6px; height: 6px; border-radius: 50%; background: #d4af37;
    margin-left: auto; opacity: 0; transition: opacity 0.2s;
  }
  .agent.speaking .spark { opacity: 1; animation: pulse 0.6s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; transform: scale(1.3); } }

  .center { display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 24px; }
  .banner { text-align: center; }
  .banner h1 {
    font-size: 32px; letter-spacing: 8px; text-transform: uppercase; color: #d4af37;
    font-weight: 400; margin-bottom: 6px;
  }
  .banner p { color: #6a5e42; letter-spacing: 2px; font-size: 11px; }

  .table {
    width: 480px; height: 380px; border-radius: 50%;
    background: radial-gradient(circle at center, #2a200f 0%, #0f0b06 70%);
    border: 2px solid #3a2f1a;
    box-shadow: inset 0 0 40px rgba(212,175,55,0.1), 0 20px 80px rgba(0,0,0,0.8);
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .table .sigil { font-size: 120px; opacity: 0.15; }
  .mic-btn {
    position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 80px; border-radius: 50%; border: 3px solid #d4af37;
    background: #1f1a10; color: #d4af37; font-size: 28px; cursor: pointer;
    box-shadow: 0 8px 32px rgba(212,175,55,0.3);
    transition: all 0.2s;
  }
  .mic-btn:hover { transform: translateX(-50%) scale(1.08); }
  .mic-btn.recording { background: #d4af37; color: #05060a; animation: glow 1s infinite alternate; }
  @keyframes glow { to { box-shadow: 0 8px 60px rgba(212,175,55,0.9); } }
  .status { color: #8a7e62; font-size: 13px; margin-top: 60px; letter-spacing: 2px; text-align: center; }

  .log { font-family: 'Menlo', monospace; font-size: 12px; line-height: 1.6; }
  .log-entry { margin-bottom: 10px; padding: 8px 10px; background: #0f0b06; border-radius: 6px; border-left: 2px solid #3a2f1a; }
  .log-entry .speaker { color: #d4af37; font-weight: bold; }
  .log-entry.user { border-left-color: #6a8eb8; }
  .log-entry.user .speaker { color: #6a8eb8; }

  .footer { display: flex; gap: 8px; margin-top: 20px; }
  .footer button {
    flex: 1; background: transparent; border: 1px solid #3a2f1a; color: #8a7e62;
    padding: 8px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .footer button:hover { background: #1a1410; color: #d4af37; }
</style>
</head>
<body>

<div class="intro" id="intro">
  <div class="title">
    <h1>The War Room</h1>
    <p>Council of the Realm</p>
  </div>
</div>

<div class="room">
  <aside class="side">
    <h2>The Council</h2>
    <div id="agents"></div>
  </aside>

  <section class="center">
    <div class="banner">
      <h1>The War Room</h1>
      <p>Speak. The Council listens.</p>
    </div>

    <div class="table">
      <span class="sigil" id="sigil">🦀</span>
      <button class="mic-btn" id="micBtn" title="Press to speak">🎙️</button>
    </div>

    <div class="status" id="status">Tap the microphone to begin.</div>
  </section>

  <aside class="side right">
    <h2>Transcript</h2>
    <div class="log" id="log"></div>
    <div class="footer">
      <button onclick="clearPin()">Unpin</button>
      <button onclick="clearLog()">Clear</button>
    </div>
  </aside>
</div>

<script>
const AGENTS = [
  { id: 'main',     name: 'Main',     role: 'Hand of the King',       avatar: '🤴' },
  { id: 'research', name: 'Research', role: 'Grand Maester',          avatar: '📚' },
  { id: 'comms',    name: 'Comms',    role: 'Master of Whisperers',   avatar: '🕯️' },
  { id: 'content',  name: 'Content',  role: 'Royal Bard',             avatar: '🎭' },
  { id: 'ops',      name: 'Ops',      role: 'Master of War',          avatar: '⚔️' },
  { id: 'coach',    name: 'Coach',    role: 'Tourney Champion',       avatar: '🦓' },
  { id: 'webster',  name: 'Webster',  role: 'Master of Ravens',       avatar: '📞' },
];

const agentsEl = document.getElementById('agents');
let pinnedAgent = null;

for (const a of AGENTS) {
  const el = document.createElement('div');
  el.className = 'agent';
  el.dataset.id = a.id;
  el.innerHTML = `
    <div class="avatar">${a.avatar}</div>
    <div>
      <div class="name">${a.name}</div>
      <div class="role">${a.role}</div>
    </div>
    <div class="spark"></div>
  `;
  el.onclick = () => pinAgent(a.id);
  agentsEl.appendChild(el);
}

function pinAgent(id) {
  pinnedAgent = pinnedAgent === id ? null : id;
  document.querySelectorAll('.agent').forEach(el => el.classList.toggle('pinned', el.dataset.id === pinnedAgent));
  fetch('/api/pin', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({agent_id: pinnedAgent})}).catch(()=>{});
}
function clearPin() { pinnedAgent = null; document.querySelectorAll('.agent').forEach(el => el.classList.remove('pinned')); fetch('/api/pin', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({agent_id: null})}).catch(()=>{}); }
function clearLog() { document.getElementById('log').innerHTML = ''; }

function addLog(speaker, text, isUser=false) {
  const el = document.createElement('div');
  el.className = 'log-entry' + (isUser ? ' user' : '');
  el.innerHTML = `<span class="speaker">${speaker}:</span> ${escapeHtml(text)}`;
  const log = document.getElementById('log');
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function setSpeaking(id, on) {
  document.querySelectorAll('.agent').forEach(el => el.classList.toggle('speaking', el.dataset.id === id && on));
  document.getElementById('sigil').textContent = on ? (AGENTS.find(a => a.id === id)?.avatar ?? '🦀') : '🦀';
}

let ws = null;
let micContext = null;   // 16 kHz — for mic capture to Gemini
let playContext = null;  // 24 kHz — for playing Gemini's audio back
let nextPlayTime = 0;

async function startMic() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  micContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
  playContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
  nextPlayTime = playContext.currentTime;
  const source = micContext.createMediaStreamSource(stream);
  const proc = micContext.createScriptProcessor(4096, 1, 1);
  source.connect(proc);
  proc.connect(micContext.destination);
  proc.onaudioprocess = (e) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      const input = e.inputBuffer.getChannelData(0);
      const pcm = new Int16Array(input.length);
      for (let i = 0; i < input.length; i++) pcm[i] = Math.max(-1, Math.min(1, input[i])) * 0x7FFF;
      ws.send(pcm.buffer);
    }
  };
}

function playPcmChunk(arrayBuffer) {
  if (!playContext) return;
  const pcm16 = new Int16Array(arrayBuffer);
  const float32 = new Float32Array(pcm16.length);
  for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 0x7FFF;
  const buffer = playContext.createBuffer(1, float32.length, 24000);
  buffer.getChannelData(0).set(float32);
  const src = playContext.createBufferSource();
  src.buffer = buffer;
  src.connect(playContext.destination);
  const startAt = Math.max(playContext.currentTime, nextPlayTime);
  src.start(startAt);
  nextPlayTime = startAt + buffer.duration;
}

const micBtn = document.getElementById('micBtn');
let recording = false;
micBtn.onclick = async () => {
  if (!recording) {
    ws = new WebSocket(`ws://${location.host}/ws`);
    ws.binaryType = 'arraybuffer';
    ws.onopen = () => document.getElementById('status').textContent = 'Listening…';
    ws.onmessage = (ev) => {
      if (typeof ev.data === 'string') {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'transcript') addLog('You', msg.text, true);
          if (msg.type === 'agent_text') { addLog(msg.agent_name || 'Council', msg.text); setSpeaking(msg.agent_id, false); }
          if (msg.type === 'agent_speaking') setSpeaking(msg.agent_id, true);
          if (msg.type === 'status') document.getElementById('status').textContent = msg.text;
        } catch {}
      } else {
        playPcmChunk(ev.data);
      }
    };
    ws.onclose = () => { document.getElementById('status').textContent = 'Disconnected.'; recording = false; micBtn.classList.remove('recording'); };
    await startMic();
    recording = true;
    micBtn.classList.add('recording');
  } else {
    if (ws) ws.close();
    if (micContext) micContext.close();
    if (playContext) playContext.close();
    recording = false;
    micBtn.classList.remove('recording');
  }
};

setTimeout(() => document.getElementById('intro').classList.add('fade'), 2200);
</script>
</body>
</html>
